<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
        }

        .box {
            margin-top: 100px;
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            background: #5b86e5;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #4a6fdc;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Register</h1>

    <form action="/submit" method="POST">
        <input type="hidden" name="event_id" value="{{ event_id }}">

        <input type="text" name="name" placeholder="Your Name" required><br>
        <input type="email" name="email" placeholder="Your Email" required><br>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
