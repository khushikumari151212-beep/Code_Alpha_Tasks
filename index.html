<!DOCTYPE html>
<html>
<head>
    <title>Events</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
        }

        .container {
            width: 500px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .event {
            border: 1px solid #ddd;
            margin: 10px;
            padding: 10px;
            border-radius: 8px;
        }

        a {
            text-decoration: none;
            color: white;
            background: #5b86e5;
            padding: 8px 12px;
            border-radius: 5px;
        }

        a:hover {
            background: #4a6fdc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 Events</h1>

    {% for event in events %}
    <div class="event">
        <h3>{{ event[1] }}</h3>
        <p>{{ event[2] }}</p>
        <p>{{ event[3] }}</p>
        <p>👥 Registered: {{ event[4] }}</p>
        <a href="/register/{{ event[0] }}">Register</a>
    </div>
    {% endfor %}

</div>

</body>
</html>
